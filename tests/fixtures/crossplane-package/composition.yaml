apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: library-fixture
  labels:
    crossplane.io/xrd: xfixtures.example.org
spec:
  compositeTypeRef:
    apiVersion: example.org/v1alpha1
    kind: XFixture
  mode: Resources
  resources:
    - name: configmap
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: library-fixture
              data:
                purpose: e2e-fixture
