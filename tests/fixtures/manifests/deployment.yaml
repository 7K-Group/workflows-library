apiVersion: apps/v1
kind: Deployment
metadata:
  name: library-fixture
  labels:
    app.kubernetes.io/name: library-fixture
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: library-fixture
  template:
    metadata:
      labels:
        app.kubernetes.io/name: library-fixture
    spec:
      containers:
        - name: app
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: library-fixture
  labels:
    app.kubernetes.io/name: library-fixture
spec:
  selector:
    app.kubernetes.io/name: library-fixture
  ports:
    - port: 80
      targetPort: 80
