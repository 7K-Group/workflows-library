apiVersion: v1
kind: Service
metadata:
  name: {{ include "library-fixture.name" . }}
  labels:
    {{- include "library-fixture.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "library-fixture.selectorLabels" . | nindent 4 }}
