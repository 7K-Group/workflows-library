name: "Setup platform tools"
description: "Install the Crossplane CLI, Helm, kubeconform and pluto with pinned versions (single source for CI toolchains)."

inputs:
  crossplane-version:
    description: "Crossplane CLI version (empty to skip)."
    required: false
    default: "v2.3.2"
  helm-version:
    description: "Helm version (empty to skip)."
    required: false
    default: ""
  kubeconform-version:
    description: "kubeconform version (empty to skip)."
    required: false
    default: ""
  pluto-version:
    description: "pluto version (empty to skip)."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Helm
      if: ${{ inputs.helm-version != '' }}
      uses: azure/setup-helm@v5
      with:
        version: ${{ inputs.helm-version }}

    - name: Install Crossplane CLI
      if: ${{ inputs.crossplane-version != '' }}
      shell: bash
      run: |
        curl -fsSL "https://releases.crossplane.io/stable/${{ inputs.crossplane-version }}/bin/linux_amd64/crossplane" -o /usr/local/bin/crossplane
        chmod +x /usr/local/bin/crossplane
        crossplane version --client

    - name: Install kubeconform
      if: ${{ inputs.kubeconform-version != '' }}
      shell: bash
      run: |
        curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${{ inputs.kubeconform-version }}/kubeconform-linux-amd64.tar.gz" \
          | tar xz -C /usr/local/bin kubeconform

    - name: Install pluto
      if: ${{ inputs.pluto-version != '' }}
      shell: bash
      run: |
        curl -fsSL "https://github.com/FairwindsOps/pluto/releases/download/v${{ inputs.pluto-version }}/pluto_${{ inputs.pluto-version }}_linux_amd64.tar.gz" \
          | tar xz -C /usr/local/bin pluto
