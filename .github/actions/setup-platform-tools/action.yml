name: "Setup platform tools"
description: "Install the Crossplane CLI, Helm, kubeconform and pluto with pinned versions (single source for CI toolchains). Pass an empty string for any tool to skip it. Defaults are the repo-wide standard versions from .tool-versions — the library-ci version-sync check enforces they stay in sync."

inputs:
  crossplane-version:
    description: "Crossplane CLI version (empty to skip)."
    required: false
    default: "v2.3.2"
  helm-version:
    description: "Helm version (empty to skip)."
    required: false
    default: "v4.1.4"
  kubeconform-version:
    description: "kubeconform version (empty to skip)."
    required: false
    default: "v0.6.7"
  pluto-version:
    description: "pluto version (empty to skip)."
    required: false
    default: "5.21.0"

runs:
  using: composite
  steps:
    - name: Set up Helm
      if: ${{ inputs.helm-version != '' }}
      uses: azure/setup-helm@v5
      with:
        version: ${{ inputs.helm-version }}

    - name: Install Crossplane CLI
      if: ${{ inputs.crossplane-version != '' }}
      shell: bash
      run: |
        curl -fsSL "https://cli.crossplane.io/stable/${{ inputs.crossplane-version }}/bin/linux_amd64/crossplane" -o /usr/local/bin/crossplane
        chmod +x /usr/local/bin/crossplane
        crossplane version --client

    - name: Install kubeconform
      if: ${{ inputs.kubeconform-version != '' }}
      shell: bash
      run: |
        curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${{ inputs.kubeconform-version }}/kubeconform-linux-amd64.tar.gz" \
          | tar xz -C /usr/local/bin kubeconform

    - name: Install pluto
      if: ${{ inputs.pluto-version != '' }}
      shell: bash
      run: |
        curl -fsSL "https://github.com/FairwindsOps/pluto/releases/download/v${{ inputs.pluto-version }}/pluto_${{ inputs.pluto-version }}_linux_amd64.tar.gz" \
          | tar xz -C /usr/local/bin pluto
