name: "CI: Crossplane Function (Go)"

on:
  workflow_call:
    inputs:
      path:
        description: "Repo-relative path to the Go function module (where go.mod lives)."
        required: true
        type: string
      go-version:
        required: false
        type: string
        default: "1.24"
      run-golangci:
        description: "Run golangci-lint (requires a .golangci config for full value)."
        required: false
        type: boolean
        default: false
      run-govulncheck:
        required: false
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.path }}/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: govulncheck
        if: ${{ inputs.run-govulncheck }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: golangci-lint
        if: ${{ inputs.run-golangci }}
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          working-directory: ${{ inputs.path }}
          version: v2.12.2

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: go-coverage
          path: ${{ inputs.path }}/coverage.out
          if-no-files-found: ignore
          retention-days: 7
