name: "Release: Crossplane Function"

on:
  workflow_call:
    inputs:
      path:
        description: "Repo-relative path to the Go function module (Docker build context)."
        required: true
        type: string
      package-path:
        description: "Repo-relative path to the Function package dir containing crossplane.yaml (kind: Function)."
        required: true
        type: string
      version:
        required: true
        type: string
      image-name:
        description: "Short runtime image name (e.g. function-platform)."
        required: true
        type: string
      function-name:
        description: "Short Function xpkg name (e.g. function-platform). Full ref is ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${function-name}."
        required: true
        type: string
      crossplane-version:
        required: false
        type: string
        default: "v2.3.2"
      dry-run:
        description: "Build the runtime image and Function xpkg locally without pushing, signing or attesting. Harbor secrets are not required in dry-run mode."
        required: false
        type: boolean
        default: false
      examples-root:
        description: "Repo-relative path to example manifests bundled into the xpkg (`crossplane xpkg build -e`). If unset or the directory does not exist, no examples layer is bundled."
        required: false
        type: string
        default: ""
    secrets:
      HARBOR_REGISTRY:
        required: false
      HARBOR_PROJECT:
        required: false
      HARBOR_ROBOT_NAME:
        required: false
      HARBOR_ROBOT_TOKEN:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      function-digest: ${{ steps.function-digest.outputs.digest }}
    env:
      IMAGE: ${{ secrets.HARBOR_REGISTRY != '' && format('{0}/{1}/{2}', secrets.HARBOR_REGISTRY, secrets.HARBOR_PROJECT, inputs.image-name) || inputs.image-name }}
      FUNCTION_IMAGE: ${{ secrets.HARBOR_REGISTRY != '' && format('{0}/{1}/{2}', secrets.HARBOR_REGISTRY, secrets.HARBOR_PROJECT, inputs.function-name) || inputs.function-name }}
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Validate Harbor secrets
        if: ${{ !inputs.dry-run }}
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
        run: |
          for v in HARBOR_REGISTRY HARBOR_PROJECT HARBOR_ROBOT_NAME HARBOR_ROBOT_TOKEN; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v (or run with dry-run: true)"
              exit 1
            fi
          done

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: ${{ !inputs.dry-run }}

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        if: ${{ !inputs.dry-run }}
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_NAME }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Runtime image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE }}
          # latest is tagged on the Function xpkg (not the runtime image) post-push,
          # together with the major/minor aliases.
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}

      - name: Build + push runtime image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ inputs.path }}
          push: ${{ !inputs.dry-run }}
          load: ${{ inputs.dry-run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # anchore/sbom-action + cosign attest below provide the SPDX SBOM;
          # buildkit attestations are disabled to keep the manifest a plain image.
          sbom: false
          provenance: false

      # With buildkit sbom/provenance attestations enabled, steps.build.outputs.digest is
      # an OCI *index* (image + attestation children). `crossplane xpkg build
      # --embed-runtime-image` requires the platform image manifest digest — an index
      # makes the step fail, leaving the tag pointing at the bare runtime image.
      - name: Resolve runtime image manifest digest
        if: ${{ !inputs.dry-run }}
        id: runtime-manifest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          RAW=$(docker buildx imagetools inspect --raw "$IMAGE@$DIGEST")
          TYPE=$(echo "$RAW" | jq -r '.mediaType // ""')
          if [[ "$TYPE" == *"index"* ]]; then
            CHILD=$(echo "$RAW" | jq -r '[.manifests[] | select(.annotations["vnd.docker.reference.type"] != "attestation-manifest")] | .[0].digest // empty')
          else
            CHILD="$DIGEST"
          fi
          if [ -z "$CHILD" ]; then
            echo "::error::Could not resolve runtime image manifest digest from $IMAGE@$DIGEST"
            exit 1
          fi
          echo "resolved runtime manifest: $CHILD"
          echo "digest=$CHILD" >> "$GITHUB_OUTPUT"

      - name: Sign runtime image (keyless)
        if: ${{ !inputs.dry-run }}
        run: cosign sign --yes "$IMAGE@${{ steps.build.outputs.digest }}"

      - name: Generate runtime SBOM
        if: ${{ !inputs.dry-run }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-image.spdx.json

      - name: Attest runtime SBOM
        if: ${{ !inputs.dry-run }}
        run: cosign attest --yes --type spdxjson --predicate sbom-image.spdx.json "$IMAGE@${{ steps.build.outputs.digest }}"

      - name: Verify runtime signature
        if: ${{ !inputs.dry-run }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/7K-Group/workflows-library/\.github/workflows/release-function\.yml@.*$' \
            "$IMAGE@${{ steps.build.outputs.digest }}"

      - name: Pull runtime image for embed
        if: ${{ !inputs.dry-run }}
        run: docker pull "$IMAGE@${{ steps.runtime-manifest.outputs.digest }}"

      - name: Install Crossplane CLI
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@v1
        with:
          crossplane-version: ${{ inputs.crossplane-version }}
          helm-version: ""
          kubeconform-version: ""
          pluto-version: ""

      - name: Build Function xpkg (embeds runtime)
        env:
          DIGEST: ${{ steps.runtime-manifest.outputs.digest }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          # In dry-run the image was loaded into the local Docker cache by tag,
          # so reference it by tag instead of registry digest.
          if [ "$DRY_RUN" = "true" ]; then
            EMBED_REF="$IMAGE:$VERSION"
          else
            EMBED_REF="$IMAGE@$DIGEST"
          fi
          # crossplane xpkg build defaults --examples-root to ./examples relative to
          # the checkout root, then fails on any non-manifest YAML it finds there
          # (e.g. cdk8s.yaml). Point it at a guaranteed-nonexistent path when the
          # caller didn't provide a real examples dir: the CLI skips the layer.
          EXAMPLES_ROOT="${{ inputs.examples-root }}"
          if [ -z "$EXAMPLES_ROOT" ] || [ ! -d "$EXAMPLES_ROOT" ]; then
            EXAMPLES_ROOT="$(mktemp -d)/no-examples"
          fi
          crossplane xpkg build \
            --package-root=${{ inputs.package-path }} \
            --examples-root="$EXAMPLES_ROOT" \
            --embed-runtime-image="$EMBED_REF" \
            -o /tmp/function.xpkg

      - name: Push Function xpkg
        if: ${{ !inputs.dry-run }}
        run: crossplane xpkg push -f /tmp/function.xpkg "$FUNCTION_IMAGE:$VERSION"

      - name: Resolve Function xpkg digest
        if: ${{ !inputs.dry-run }}
        id: function-digest
        run: echo "digest=$(docker buildx imagetools inspect "$FUNCTION_IMAGE:$VERSION" --format '{{.Manifest.Digest}}')" >> "$GITHUB_OUTPUT"

      # The xpkg (not the bare runtime image) is what Crossplane pulls, so the
      # major/minor/latest aliases must point at the xpkg digest.
      - name: Tag Function xpkg aliases
        if: ${{ !inputs.dry-run }}
        run: |
          MAJOR_MINOR="${VERSION%.*}"
          MAJOR="${VERSION%%.*}"
          docker buildx imagetools create \
            -t "$FUNCTION_IMAGE:$MAJOR_MINOR" -t "$FUNCTION_IMAGE:$MAJOR" -t "$FUNCTION_IMAGE:latest" \
            "$FUNCTION_IMAGE@${{ steps.function-digest.outputs.digest }}"

      - name: Sign Function xpkg (keyless)
        if: ${{ !inputs.dry-run }}
        run: cosign sign --yes "$FUNCTION_IMAGE@${{ steps.function-digest.outputs.digest }}"

      - name: Verify Function xpkg signature
        if: ${{ !inputs.dry-run }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/7K-Group/workflows-library/\.github/workflows/release-function\.yml@.*$' \
            "$FUNCTION_IMAGE@${{ steps.function-digest.outputs.digest }}"
