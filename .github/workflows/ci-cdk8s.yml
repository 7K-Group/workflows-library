name: "CI: cdk8s"

on:
  workflow_call:
    inputs:
      path:
        description: "Repo-relative path to the cdk8s workspace root (where package.json with workspaces lives)."
        required: false
        type: string
        default: "."
      node-version:
        required: false
        type: string
        default: "20"
      validate:
        description: "Run per-workspace `npm run validate` (crossplane composition render) when present."
        required: false
        type: boolean
        default: true
      crossplane-version:
        description: "Crossplane CLI version installed when validate is enabled (empty to skip install, e.g. if the runner image already provides it)."
        required: false
        type: string
        default: "v2.3.2"
      lint:
        required: false
        type: boolean
        default: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: ${{ inputs.lint }}
        run: npm run lint --if-present

      - name: Build (tsc)
        run: npm run build --if-present

      - name: Unit tests
        run: npm run test:unit --if-present

      - name: Synth manifests
        run: npm run synth --if-present

      - name: Install Crossplane CLI
        if: ${{ inputs.validate && inputs.crossplane-version != '' }}
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@v1
        with:
          crossplane-version: ${{ inputs.crossplane-version }}
          helm-version: ""
          kubeconform-version: ""
          pluto-version: ""

      - name: Validate compositions (crossplane render)
        if: ${{ inputs.validate }}
        run: npm run validate --if-present

      - name: Upload synthesized manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cdk8s-dist
          path: ${{ inputs.path }}/**/dist/*.k8s.yaml
          if-no-files-found: ignore
          retention-days: 7
