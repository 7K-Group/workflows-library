name: "Release: Docs"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      version:
        required: true
        type: string
      prefix:
        required: false
        type: string
        default: ""
        description: "Bucket key prefix. Defaults to the calling repository name."
    secrets:
      DOCS_S3_ACCESS_KEY_ID:
        required: true
      DOCS_S3_SECRET_ACCESS_KEY:
        required: true
      APPDOCS_S3_BUCKET:
        required: true
      DOCS_S3_ENDPOINT_URL:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up s5cmd
        uses: peak/action-setup-s5cmd@bde462e7399c68b4a9b05549d90b0e7d5c95e60f  # main
        with:
          version: v2.0.0

      - name: Publish docs to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DOCS_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: garage
        run: |
          PREFIX="${{ inputs.prefix || github.event.repository.name }}"
          s5cmd --endpoint-url=${{ secrets.DOCS_S3_ENDPOINT_URL }} sync --size-only --delete ${{ inputs.path }}/ "s3://${{ secrets.APPDOCS_S3_BUCKET }}/${PREFIX}/"
          echo "Published docs v${{ inputs.version }} to ${{ secrets.APPDOCS_S3_BUCKET }}/${PREFIX}/"
