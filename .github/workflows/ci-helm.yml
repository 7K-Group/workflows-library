name: "CI: Helm"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      kubernetes-version:
        required: false
        type: string
        default: "1.31.0"
        description: "Target Kubernetes version for kubeconform schema validation"
      helm-version:
        required: false
        type: string
        default: "v4.1.4"
        description: "Helm version override (defaults to the repo-wide standard from .tool-versions)"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Helm
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@8f3f1dd841f9f34fc74a5fdb76577119b251ec0c # v1
        with:
          crossplane-version: ""
          helm-version: ${{ inputs.helm-version }}
          kubeconform-version: ""
          pluto-version: ""

      - name: Update chart dependencies
        run: helm dependency update ${{ inputs.path }}

      - name: Lint chart
        run: helm lint ${{ inputs.path }}

  template:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Helm
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@8f3f1dd841f9f34fc74a5fdb76577119b251ec0c # v1
        with:
          crossplane-version: ""
          helm-version: ${{ inputs.helm-version }}
          kubeconform-version: ""
          pluto-version: ""

      - name: Update chart dependencies
        run: helm dependency update ${{ inputs.path }}

      - name: Load chart-local API versions
        id: api-versions
        run: |
          file="${{ inputs.path }}/.ci-api-versions"
          flags=""
          if [ -f "$file" ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              # Strip comments and whitespace
              entry="${line%%#*}"
              entry="$(echo -n "$entry" | tr -d '[:space:]')"
              [ -z "$entry" ] && continue
              flags="$flags --api-versions $entry"
            done < "$file"
          fi
          echo "flags=$flags" >> "$GITHUB_OUTPUT"
          echo "Resolved api-version flags:$flags"

      - name: Template render
        run: helm template test-release ${{ inputs.path }}${{ steps.api-versions.outputs.flags }}

  unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Helm
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@8f3f1dd841f9f34fc74a5fdb76577119b251ec0c # v1
        with:
          crossplane-version: ""
          helm-version: ${{ inputs.helm-version }}
          kubeconform-version: ""
          pluto-version: ""

      - name: Update chart dependencies
        run: helm dependency update ${{ inputs.path }}

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false

      - name: Run unit tests
        run: helm unittest ${{ inputs.path }}

  test:
    needs: [lint, template, unittest]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Check for values schema
        run: |
          if [ ! -f "${{ inputs.path }}/values.schema.json" ]; then
            echo "::error::Missing values.schema.json in ${{ inputs.path }}"
            exit 1
          fi

      - name: Set up Helm
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@8f3f1dd841f9f34fc74a5fdb76577119b251ec0c # v1
        with:
          crossplane-version: ""
          helm-version: ${{ inputs.helm-version }}
          kubeconform-version: ""
          pluto-version: ""

      - name: Update chart dependencies
        run: helm dependency update ${{ inputs.path }}

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2

      - name: Run chart-testing lint
        run: |
          ct_args=(--chart-dirs "$(dirname "${{ inputs.path }}")" --charts "${{ inputs.path }}")
          if [ -f ".ct.yaml" ]; then
            ct_args+=(--config ".ct.yaml")
          fi
          ct lint "${ct_args[@]}"

  kubeconform:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Helm, kubeconform + pluto
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@8f3f1dd841f9f34fc74a5fdb76577119b251ec0c # v1
        with:
          crossplane-version: ""
          helm-version: ${{ inputs.helm-version }}

      - name: Update chart dependencies
        run: helm dependency update ${{ inputs.path }}

      - name: Load chart-local API versions
        id: api-versions
        run: |
          file="${{ inputs.path }}/.ci-api-versions"
          flags=""
          if [ -f "$file" ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              entry="${line%%#*}"
              entry="$(echo -n "$entry" | tr -d '[:space:]')"
              [ -z "$entry" ] && continue
              flags="$flags --api-versions $entry"
            done < "$file"
          fi
          echo "flags=$flags" >> "$GITHUB_OUTPUT"

      - name: Validate rendered manifests
        run: |
          helm template test-release ${{ inputs.path }}${{ steps.api-versions.outputs.flags }} \
            | kubeconform \
              -strict \
              -ignore-missing-schemas \
              -kubernetes-version "${{ inputs.kubernetes-version }}" \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datree/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -summary -

      - name: Check for deprecated APIs
        run: |
          helm template test-release ${{ inputs.path }}${{ steps.api-versions.outputs.flags }} \
            | pluto detect -
