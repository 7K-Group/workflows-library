name: "Release: Helm"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      version:
        required: true
        type: string
      dry-run:
        description: "Lint and package the chart without logging in, pushing or signing. Harbor secrets are not required in dry-run mode."
        required: false
        type: boolean
        default: false
      helm-version:
        required: false
        type: string
        default: "v4.1.4"
        description: "Helm version override (defaults to the repo-wide standard from .tool-versions)"
    secrets:
      HARBOR_REGISTRY:
        required: false
      HARBOR_PROJECT:
        required: false
      HARBOR_ROBOT_NAME:
        required: false
      HARBOR_ROBOT_TOKEN:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write  # keyless cosign signing via Sigstore OIDC
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Validate Harbor secrets
        if: ${{ !inputs.dry-run }}
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
        run: |
          for v in HARBOR_REGISTRY HARBOR_PROJECT HARBOR_ROBOT_NAME HARBOR_ROBOT_TOKEN; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v (or run with dry-run: true)"
              exit 1
            fi
          done

      - name: Set up Helm
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@8f3f1dd841f9f34fc74a5fdb76577119b251ec0c # v1
        with:
          crossplane-version: ""
          helm-version: ${{ inputs.helm-version }}
          kubeconform-version: ""
          pluto-version: ""

      - name: Update chart dependencies
        run: helm dependency update ${{ inputs.path }}

      - name: Install cosign
        if: ${{ !inputs.dry-run }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Lint before publish
        run: helm lint ${{ inputs.path }}

      - name: Login to Harbor (OCI)
        if: ${{ !inputs.dry-run }}
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
        run: |
          echo "$HARBOR_ROBOT_TOKEN" | \
            helm registry login "$HARBOR_REGISTRY" \
              --username "$HARBOR_ROBOT_NAME" \
              --password-stdin
          echo "$HARBOR_ROBOT_TOKEN" | \
            cosign login "$HARBOR_REGISTRY" \
              --username "$HARBOR_ROBOT_NAME" \
              --password-stdin

      - name: Package chart
        id: package
        env:
          CHART_PATH: ${{ inputs.path }}
          CHART_VERSION: ${{ inputs.version }}
        run: |
          CHART_NAME=$(awk '/^name:/ {print $2; exit}' "$CHART_PATH/Chart.yaml")
          PACKAGE="${CHART_NAME}-${CHART_VERSION}.tgz"
          helm package "$CHART_PATH" --version "$CHART_VERSION"
          test -f "$PACKAGE"
          echo "name=$CHART_NAME" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Push to Harbor
        if: ${{ !inputs.dry-run }}
        id: push
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          CHART_NAME: ${{ steps.package.outputs.name }}
          PACKAGE: ${{ steps.package.outputs.package }}
        run: |
          REF="oci://$HARBOR_REGISTRY/$HARBOR_PROJECT/charts"
          if ! OUTPUT=$(helm push "$PACKAGE" "$REF" 2>&1); then
            echo "$OUTPUT"
            exit 1
          fi
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          if [ -z "$DIGEST" ]; then
            echo "ERROR: could not parse digest from helm push output" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "ref=$HARBOR_REGISTRY/$HARBOR_PROJECT/charts/$CHART_NAME" >> "$GITHUB_OUTPUT"

      - name: Sign chart with cosign (keyless)
        if: ${{ !inputs.dry-run }}
        run: cosign sign --yes "${{ steps.push.outputs.ref }}@${{ steps.push.outputs.digest }}"

      - name: Verify signature
        if: ${{ !inputs.dry-run }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/7K-Group/workflows-library/\.github/workflows/release-helm\.yml@.*$' \
            "${{ steps.push.outputs.ref }}@${{ steps.push.outputs.digest }}"
