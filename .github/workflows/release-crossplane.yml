name: "Release: Crossplane Package"

on:
  workflow_call:
    inputs:
      path:
        description: "Repo-relative path to the Crossplane package directory (must contain crossplane.yaml)."
        required: true
        type: string
      version:
        description: "Semver from release-please (no leading v required)."
        required: true
        type: string
      image:
        description: "Short package name (e.g. platform-primitives). Full ref is ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${image}."
        required: true
        type: string
      examples-root:
        required: false
        type: string
        default: ""
      crossplane-version:
        required: false
        type: string
        default: "v2.3.2"
      node-version:
        required: false
        type: string
        default: "20"
      prebuild:
        description: "Optional shell command run at the repo root before building (e.g. aggregate cdk8s synth output into the package dir). Triggers npm ci."
        required: false
        type: string
        default: ""
      dry-run:
        description: "Build the xpkg without pushing, signing or attesting. Harbor secrets are not required in dry-run mode."
        required: false
        type: boolean
        default: false
    secrets:
      HARBOR_REGISTRY:
        required: false
      HARBOR_PROJECT:
        required: false
      HARBOR_ROBOT_NAME:
        required: false
      HARBOR_ROBOT_TOKEN:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    env:
      IMAGE: ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ inputs.image }}
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Validate Harbor secrets
        if: ${{ !inputs.dry-run }}
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
        run: |
          for v in HARBOR_REGISTRY HARBOR_PROJECT HARBOR_ROBOT_NAME HARBOR_ROBOT_TOKEN; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v (or run with dry-run: true)"
              exit 1
            fi
          done

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        if: ${{ inputs.prebuild != '' }}
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install JS deps
        if: ${{ inputs.prebuild != '' }}
        run: npm ci

      - name: Prepare package
        if: ${{ inputs.prebuild != '' }}
        run: ${{ inputs.prebuild }}

      - name: Install Crossplane CLI
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@v1
        with:
          crossplane-version: ${{ inputs.crossplane-version }}
          helm-version: ""
          kubeconform-version: ""
          pluto-version: ""

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        if: ${{ !inputs.dry-run }}

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        if: ${{ !inputs.dry-run }}
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_NAME }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Build xpkg
        run: |
          examples="${{ inputs.examples-root }}"
          if [ -z "$examples" ]; then examples=/tmp/_empty_examples; mkdir -p "$examples"; fi
          crossplane xpkg build --package-root=${{ inputs.path }} -e "$examples" -o /tmp/package.xpkg

      - name: Push xpkg
        if: ${{ !inputs.dry-run }}
        run: crossplane xpkg push -f /tmp/package.xpkg "$IMAGE:$VERSION"

      - name: Resolve digest
        if: ${{ !inputs.dry-run }}
        id: digest
        run: echo "digest=$(docker buildx imagetools inspect "$IMAGE:$VERSION" --format '{{.Manifest.Digest}}')" >> "$GITHUB_OUTPUT"

      - name: Sign xpkg (keyless)
        if: ${{ !inputs.dry-run }}
        run: cosign sign --yes "$IMAGE@${{ steps.digest.outputs.digest }}"

      - name: Generate SBOM
        if: ${{ !inputs.dry-run }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.digest.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        if: ${{ !inputs.dry-run }}
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json "$IMAGE@${{ steps.digest.outputs.digest }}"

      - name: Verify signature + SBOM attestation
        if: ${{ !inputs.dry-run }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/7K-Group/workflows-library/\.github/workflows/release-crossplane\.yml@.*$' \
            "$IMAGE@${{ steps.digest.outputs.digest }}"
          cosign verify-attestation --type spdxjson \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/7K-Group/workflows-library/\.github/workflows/release-crossplane\.yml@.*$' \
            "$IMAGE@${{ steps.digest.outputs.digest }}"
