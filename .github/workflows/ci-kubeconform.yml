name: "CI: Kubeconform"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
        description: "Path to the directory containing Kubernetes manifests"
      kubernetes-version:
        required: false
        type: string
        default: "1.31.0"
        description: "Target Kubernetes version for schema validation"
      kubeconform-version:
        required: false
        type: string
        default: "v0.6.7"
        description: "kubeconform version override (defaults to the repo-wide standard from .tool-versions)"
      pluto-version:
        required: false
        type: string
        default: "5.21.0"
        description: "pluto version override (defaults to the repo-wide standard from .tool-versions)"

jobs:
  validate:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install kubeconform + pluto
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@v1
        with:
          crossplane-version: ""
          helm-version: ""
          kubeconform-version: ${{ inputs.kubeconform-version }}
          pluto-version: ${{ inputs.pluto-version }}

      - name: Validate manifests
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -kubernetes-version "${{ inputs.kubernetes-version }}" \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datree/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary \
            ${{ inputs.path }}

      - name: Check for deprecated APIs
        run: |
          pluto detect-files \
            -d ${{ inputs.path }} \
            --target-versions "k8s=v${{ inputs.kubernetes-version }}" \
            -o wide
