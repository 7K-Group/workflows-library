name: "Release: App"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      version:
        required: true
        type: string
      image-name:
        description: "Short image name (e.g. my-app). Full path is built from HARBOR_REGISTRY/HARBOR_PROJECT secrets."
        required: true
        type: string
      dry-run:
        description: "Build the image locally without pushing, signing or attesting. Harbor secrets are not required in dry-run mode."
        required: false
        type: boolean
        default: false
    secrets:
      HARBOR_REGISTRY:
        required: false
      HARBOR_PROJECT:
        required: false
      HARBOR_ROBOT_NAME:
        required: false
      HARBOR_ROBOT_TOKEN:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      # keyless cosign signing via Sigstore OIDC
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      IMAGE: ${{ secrets.HARBOR_REGISTRY != '' && format('{0}/{1}/{2}', secrets.HARBOR_REGISTRY, secrets.HARBOR_PROJECT, inputs.image-name) || inputs.image-name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Validate Harbor secrets
        if: ${{ !inputs.dry-run }}
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
        run: |
          for v in HARBOR_REGISTRY HARBOR_PROJECT HARBOR_ROBOT_NAME HARBOR_ROBOT_TOKEN; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v (or run with dry-run: true)"
              exit 1
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Install cosign
        if: ${{ !inputs.dry-run }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Login to Harbor
        if: ${{ !inputs.dry-run }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_NAME }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: ${{ inputs.path }}
          push: ${{ !inputs.dry-run }}
          load: ${{ inputs.dry-run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # anchore/sbom-action + cosign attest below provide the SPDX SBOM;
          # buildkit attestations are disabled to keep the manifest a plain image.
          sbom: false
          provenance: false

      - name: Sign image with cosign (keyless)
        if: ${{ !inputs.dry-run }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify signature
        if: ${{ !inputs.dry-run }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/7K-Group/workflows-library/\.github/workflows/release-app\.yml@.*$' \
            "${IMAGE}@${DIGEST}"

      - name: Generate SBOM
        if: ${{ !inputs.dry-run }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM to image
        if: ${{ !inputs.dry-run }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE}@${DIGEST}"
