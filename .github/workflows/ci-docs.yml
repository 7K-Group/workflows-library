name: "CI: Docs"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@6bf21b07787794f89a243495939cd651942aeabe # v24
        with:
          globs: |
            ${{ inputs.path }}/**/*.md
            !**/CHANGELOG.md
