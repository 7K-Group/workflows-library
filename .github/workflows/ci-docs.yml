name: "CI: Docs"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}'
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            ${{ inputs.path }}/**/*.md
            !**/CHANGELOG.md
