name: "Promote image (re-tag by digest)"

on:
  workflow_call:
    inputs:
      image:
        description: "Short image/package name. Full ref is ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${image}."
        required: true
        type: string
      digest:
        description: "Source manifest digest (sha256:...) to promote. Must already exist (built by a release-* workflow)."
        required: true
        type: string
      tags:
        description: "Comma-separated target tags to point at the digest (e.g. staging,prod,1.2.3)."
        required: true
        type: string
      sign:
        description: "Keyless-cosign sign the digest (signature covers every tag pointing at it)."
        required: false
        type: boolean
        default: true
      dry-run:
        description: "Validate inputs without logging in, re-tagging or signing. Harbor secrets are not required in dry-run mode."
        required: false
        type: boolean
        default: false
    secrets:
      HARBOR_REGISTRY:
        required: false
      HARBOR_PROJECT:
        required: false
      HARBOR_ROBOT_NAME:
        required: false
      HARBOR_ROBOT_TOKEN:
        required: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ inputs.image }}
    steps:
      - name: Validate inputs
        env:
          DIGEST: ${{ inputs.digest }}
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
        run: |
          if [[ "$DIGEST" != sha256:* ]]; then
            echo "::error::digest must start with sha256:, got: $DIGEST"
            exit 1
          fi
          if [ "${{ inputs.dry-run }}" != "true" ]; then
            for v in HARBOR_REGISTRY HARBOR_PROJECT HARBOR_ROBOT_NAME HARBOR_ROBOT_TOKEN; do
              if [ -z "${!v}" ]; then
                echo "::error::Missing required secret: $v (or run with dry-run: true)"
                exit 1
              fi
            done
          fi

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4
        if: ${{ !inputs.dry-run }}

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        if: ${{ !inputs.dry-run }}
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_NAME }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Re-tag digest (no rebuild)
        if: ${{ !inputs.dry-run }}
        run: |
          IFS=',' read -ra TAGS <<< "${{ inputs.tags }}"
          for tag in "${TAGS[@]}"; do
            tag="$(echo -n "$tag" | tr -d '[:space:]')"
            [ -z "$tag" ] && continue
            echo "Pointing $IMAGE:$tag at ${{ inputs.digest }}"
            docker buildx imagetools create --tag "$IMAGE:$tag" "$IMAGE@${{ inputs.digest }}"
          done

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        if: ${{ inputs.sign && !inputs.dry-run }}

      - name: Sign digest (keyless)
        if: ${{ inputs.sign && !inputs.dry-run }}
        run: cosign sign --yes "$IMAGE@${{ inputs.digest }}"
