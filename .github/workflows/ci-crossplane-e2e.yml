name: "CI: Crossplane Package e2e (kind)"

# Integration gate: build the xpkg, install it into an ephemeral kind cluster via a
# local OCI registry, and assert its XRDs reach Established. Catches bad XRD schema
# and missing/invalid package metadata that `xpkg build` alone cannot. XRs are not
# reconciled here (their Composition Functions may be absent), so this validates the
# package installs cleanly — not end-to-end resource provisioning.
#
# Runs in GitHub-hosted runners (needs docker + kind). Promote to a required check
# only after the first successful run in CI.
#
# Registry addressing: Crossplane's package manager fetches the xpkg OCI manifest
# itself from inside the crossplane pod, so the package reference must resolve via
# cluster DNS (CoreDNS) — a containerd mirror or docker-network hostname does NOT
# work. We therefore reference the registry by its IP on the kind docker network,
# which pod traffic reaches via the node without any DNS lookup.

on:
  workflow_call:
    inputs:
      path:
        description: "Repo-relative path to the Crossplane package directory (must contain crossplane.yaml)."
        required: true
        type: string
      image:
        description: "Short package name used for the local-registry tag (default: platform-primitives)."
        required: false
        type: string
        default: "platform-primitives"
      prebuild:
        description: "Optional shell command run at the repo root before building. Triggers npm ci."
        required: false
        type: string
        default: ""
      node-version:
        required: false
        type: string
        default: "20"
      crossplane-version:
        required: false
        type: string
        default: "v2.3.2"
      kube-version:
        required: false
        type: string
        default: "v1.31.0"
      cluster-name:
        required: false
        type: string
        default: "xpkg-e2e"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REG_PORT: "5000"
      PUSH_IMAGE: localhost:5000/${{ inputs.image }}:ci
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        if: ${{ inputs.prebuild != '' }}
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install JS deps
        if: ${{ inputs.prebuild != '' }}
        run: npm ci

      - name: Prepare package
        if: ${{ inputs.prebuild != '' }}
        run: ${{ inputs.prebuild }}

      - name: Install tools
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@v1
        with:
          crossplane-version: ${{ inputs.crossplane-version }}
          kubeconform-version: ""
          pluto-version: ""

      - name: Build xpkg
        run: |
          mkdir -p /tmp/_empty_examples
          crossplane xpkg build --package-root=${{ inputs.path }} -e /tmp/_empty_examples -o /tmp/package.xpkg

      - name: Start local OCI registry
        run: |
          docker run -d --restart=always -p 127.0.0.1:${REG_PORT}:5000 --name registry registry:2

      - name: Write kind config
        run: |
          cat > /tmp/kind-config.yaml <<EOF
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
              image: kindest/node:${{ inputs.kube-version }}
          EOF

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ inputs.cluster-name }}
          config: /tmp/kind-config.yaml

      - name: Connect registry to kind network
        run: |
          docker network connect kind registry || true
          REG_IP=$(docker inspect -f '{{.NetworkSettings.Networks.kind.IPAddress}}' registry)
          echo "Registry kind-network IP: $REG_IP"
          echo "REG_IP=$REG_IP" >> "$GITHUB_ENV"

      - name: Document local registry for cluster
        run: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: ConfigMap
          metadata: { name: local-registry-hosting, namespace: kube-public }
          data:
            localRegistryHosting.v1: |
              host: "${REG_IP}:5000"
          EOF

      - name: Push xpkg to local registry
        run: crossplane xpkg push -f /tmp/package.xpkg "$PUSH_IMAGE"

      - name: Install Crossplane
        run: |
          helm repo add crossplane-stable https://charts.crossplane.io/stable
          helm repo update
          helm install crossplane crossplane-stable/crossplane \
            --namespace crossplane-system --create-namespace \
            --wait --timeout 5m

      - name: Install Configuration from local registry
        run: |
          kubectl apply -f - <<EOF
          apiVersion: pkg.crossplane.io/v1
          kind: Configuration
          metadata: { name: ${{ inputs.image }} }
          spec:
            package: "${REG_IP}:${REG_PORT}/${{ inputs.image }}:ci"
            packagePullPolicy: Always
          EOF

      - name: Wait for Configuration healthy
        run: |
          kubectl wait --for=condition=Healthy configuration.pkg/${{ inputs.image }} --timeout=300s

      - name: Wait for XRDs Established
        run: |
          pip install pyyaml
          NAMES=$(python3 - <<'PY'
          import glob, os, yaml
          out = []
          for f in glob.glob("${{ inputs.path }}/*.yaml") + glob.glob("${{ inputs.path }}/*.k8s.yaml"):
              if f.endswith("crossplane.yaml"):
                  continue
              for doc in yaml.safe_load_all(open(f)):
                  if isinstance(doc, dict) and doc.get("kind") == "CompositeResourceDefinition":
                      out.append(doc["metadata"]["name"])
          print(" ".join(out))
          PY
          )
          echo "Expecting XRDs: $NAMES"
          for xrd in $NAMES; do
            kubectl wait --for=condition=Established "xrd/$xrd" --timeout=300s
          done

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get configuration.pkg -o wide
          kubectl describe configuration.pkg/${{ inputs.image }} || true
          kubectl get xrd || true
          kubectl -n crossplane-system logs deploy/crossplane --tail=100 || true
