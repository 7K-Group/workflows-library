name: "CI: Crossplane"

on:
  workflow_call:
    inputs:
      path:
        description: "Repo-relative path to the Crossplane package directory (must contain crossplane.yaml)."
        required: true
        type: string
      kubernetes-version:
        required: false
        type: string
        default: "1.31.0"
      crossplane-version:
        required: false
        type: string
        default: "v2.3.2"
      node-version:
        required: false
        type: string
        default: "20"
      prebuild:
        description: "Optional shell command run at the repo root before building (e.g. aggregate cdk8s synth output into the package dir). Triggers npm ci."
        required: false
        type: string
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        if: ${{ inputs.prebuild != '' }}
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install JS deps
        if: ${{ inputs.prebuild != '' }}
        run: npm ci

      - name: Prepare package
        if: ${{ inputs.prebuild != '' }}
        run: ${{ inputs.prebuild }}

      - name: Install Crossplane CLI
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@8f3f1dd841f9f34fc74a5fdb76577119b251ec0c # v1
        with:
          crossplane-version: ${{ inputs.crossplane-version }}
          helm-version: ""
          kubeconform-version: ""
          pluto-version: ""

      - name: Lint YAML
        run: |
          pip install yamllint
          yamllint -d "{extends: default, rules: {line-length: {max: 200}, truthy: disable, document-start: disable}}" ${{ inputs.path }}

      - name: Validate crossplane.yaml
        run: |
          pip install pyyaml
          python3 - <<'PY'
          import os, yaml
          root = "${{ inputs.path }}"
          d = yaml.safe_load(open(os.path.join(root, "crossplane.yaml")))
          assert d.get("apiVersion", "").startswith("meta.pkg.crossplane.io/"), f"bad apiVersion: {d.get('apiVersion')}"
          assert d.get("kind") in {"Configuration", "Function", "Provider"}, f"unexpected kind: {d.get('kind')}"
          assert d.get("metadata", {}).get("name"), "metadata.name is required"
          for dep in (d.get("spec") or {}).get("dependsOn") or []:
              ref = dep.get("function") or dep.get("provider") or dep.get("configuration") or ""
              if "function-platform" in ref and "upbound.io" in ref:
                  raise SystemExit(f"placeholder dependsOn must point at the real registry ref, got: {ref}")
          print("crossplane.yaml OK:", d["kind"], d["metadata"]["name"])
          PY

      - name: Build package (validates structure)
        run: |
          mkdir -p /tmp/_empty_examples
          crossplane xpkg build --package-root=${{ inputs.path }} -e /tmp/_empty_examples -o /tmp/package.xpkg

      - name: Install kubeconform + pluto
        uses: 7K-Group/workflows-library/.github/actions/setup-platform-tools@8f3f1dd841f9f34fc74a5fdb76577119b251ec0c # v1
        with:
          crossplane-version: ""
          helm-version: ""

      - name: Schema-validate manifests
        run: |
          mapfile -t files < <(find "${{ inputs.path }}" -name '*.yaml' -not -name 'crossplane.yaml')
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -kubernetes-version "${{ inputs.kubernetes-version }}" \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datree/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary \
            "${files[@]}"

      - name: Detect deprecated APIs
        run: |
          mapfile -t files < <(find "${{ inputs.path }}" -name '*.yaml' -not -name 'crossplane.yaml')
          pluto detect-files "${files[@]}"
